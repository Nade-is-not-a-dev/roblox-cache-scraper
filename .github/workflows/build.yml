name: Build RobloxCacheScraper

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHONHASHSEED: '0'
  SOURCE_DATE_EPOCH: '0'
  LC_ALL: C.UTF-8
  TZ: UTC

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: uv run pyinstaller RobloxCacheScraper.spec --clean --noconfirm

      - name: Get version
        id: version
        shell: bash
        run: |
          version="$(sed -n "s/^__version__ = ['\"]\([^'\"]*\)['\"]$/\\1/p" __init__.py)"
          echo "app_version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: RobloxCacheScraper-v${{ steps.version.outputs.app_version }}-Windows.exe
          path: dist/RobloxCacheScraper-v*.exe
          archive: false
          if-no-files-found: error
